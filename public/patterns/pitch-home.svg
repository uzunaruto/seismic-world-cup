  <defs>
    <linearGradient id="skyH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec0ff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#7ec0ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7ec0ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#fff5b0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff5b0" stop-opacity="0"/>
