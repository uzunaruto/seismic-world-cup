    <circle cx="540" cy="290" r="5" fill="rgba(255,255,255,0.85)"/>
    <rect x="240" y="1130" width="600" height="180"/>
    <rect x="380" y="1230" width="320" height="80"/>
    <circle cx="540" cy="1060" r="5" fill="rgba(255,255,255,0.85)"/>
  </g>
