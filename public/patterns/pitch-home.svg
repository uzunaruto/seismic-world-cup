      <path d="M10 580 q1.5 -7 3 0 z"/><path d="M70 660 q1 -4 2 0 z"/><path d="M130 620 q1.5 -6 3 0 z"/><path d="M190 700 q1 -5 2 0 z"/><path d="M250 590 q1.5 -7 3 0 z"/><path d="M310 680 q1 -4 2 0 z"/><path d="M370 630 q1.5 -6 3 0 z"/><path d="M430 710 q1 -5 2 0 z"/><path d="M490 580 q1.5 -7 3 0 z"/><path d="M550 670 q1 -4 2 0 z"/><path d="M610 620 q1.5 -6 3 0 z"/><path d="M670 700 q1 -5 2 0 z"/><path d="M730 590 q1.5 -7 3 0 z"/><path d="M790 680 q1 -4 2 0 z"/><path d="M850 630 q1.5 -6 3 0 z"/><path d="M910 710 q1 -5 2 0 z"/><path d="M970 600 q1.5 -7 3 0 z"/><path d="M1030 690 q1 -4 2 0 z"/>
      <path d="M40 840 q1.5 -6 3 0 z"/><path d="M100 920 q1 -5 2 0 z"/><path d="M160 870 q1.5 -7 3 0 z"/><path d="M220 950 q1 -4 2 0 z"/><path d="M280 860 q1.5 -6 3 0 z"/><path d="M340 940 q1 -5 2 0 z"/><path d="M400 880 q1.5 -7 3 0 z"/><path d="M460 960 q1 -4 2 0 z"/><path d="M520 870 q1.5 -6 3 0 z"/><path d="M580 950 q1 -5 2 0 z"/><path d="M640 890 q1.5 -7 3 0 z"/><path d="M700 970 q1 -4 2 0 z"/><path d="M760 860 q1.5 -6 3 0 z"/><path d="M820 940 q1 -5 2 0 z"/><path d="M880 880 q1.5 -7 3 0 z"/><path d="M940 960 q1 -4 2 0 z"/><path d="M1000 870 q1.5 -6 3 0 z"/><path d="M1060 950 q1 -5 2 0 z"/>
      <path d="M20 1100 q1.5 -7 3 0 z"/><path d="M80 1180 q1 -4 2 0 z"/><path d="M140 1130 q1.5 -6 3 0 z"/><path d="M200 1210 q1 -5 2 0 z"/><path d="M260 1110 q1.5 -7 3 0 z"/><path d="M320 1190 q1 -4 2 0 z"/><path d="M380 1140 q1.5 -6 3 0 z"/><path d="M440 1220 q1 -5 2 0 z"/><path d="M500 1110 q1.5 -7 3 0 z"/><path d="M560 1190 q1 -4 2 0 z"/><path d="M620 1140 q1.5 -6 3 0 z"/><path d="M680 1220 q1 -5 2 0 z"/><path d="M740 1110 q1.5 -7 3 0 z"/><path d="M800 1190 q1 -4 2 0 z"/><path d="M860 1140 q1.5 -6 3 0 z"/><path d="M920 1220 q1 -5 2 0 z"/><path d="M980 1110 q1.5 -7 3 0 z"/><path d="M1040 1190 q1 -4 2 0 z"/>
    </g>
    <g fill="#7ac85c" opacity="0.35">
