    <line x1="900" y1="120" x2="1080" y2="0" stroke="#fff8c8" stroke-width="1.2"/>
    <line x1="900" y1="120" x2="1080" y2="120" stroke="#fff8c8" stroke-width="1.2"/>
  </g>

  <!-- 5. Stadium crowd silhouette (very top) -->
  <g opacity="0.7">
    <path d="M 0 0 L 0 60 L 30 50 L 50 65 L 80 45 L 110 70 L 140 50 L 170 68 L 200 45 L 230 65 L 260 48 L 290 70 L 320 50 L 350 65 L 380 45 L 410 68 L 440 50 L 470 66 L 500 45 L 530 68 L 560 50 L 590 65 L 620 46 L 650 68 L 680 50 L 710 66 L 740 45 L 770 68 L 800 50 L 830 65 L 860 48 L 890 68 L 920 50 L 950 66 L 980 45 L 1010 68 L 1040 50 L 1080 65 L 1080 0 Z" fill="#1a3a14"/>
