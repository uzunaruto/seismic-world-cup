    <rect x="0" y="0" width="1080" height="135" fill="#5ca046"/>
    <rect x="0" y="135" width="1080" height="135" fill="#4a8c3a"/>
    <rect x="0" y="270" width="1080" height="135" fill="#5ca046"/>
    <rect x="0" y="405" width="1080" height="135" fill="#4a8c3a"/>
    <rect x="0" y="540" width="1080" height="135" fill="#5ca046"/>
    <rect x="0" y="675" width="1080" height="135" fill="#4a8c3a"/>
    <rect x="0" y="810" width="1080" height="135" fill="#5ca046"/>
    <rect x="0" y="945" width="1080" height="135" fill="#4a8c3a"/>
