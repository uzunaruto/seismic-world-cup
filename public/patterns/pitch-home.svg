<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec0ff" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#7ec0ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7ec0ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#fff8c8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerH" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballH" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="ballShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
