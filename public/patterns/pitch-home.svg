  <g transform="translate(900 280)" opacity="0.85">
    <ellipse cx="0" cy="105" rx="60" ry="9" fill="url(#ballShadow)"/>
    <circle r="80" fill="url(#ballH)"/>
    <polygon points="0,-40 38,-12 24,33 -24,33 -38,-12" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="38" y1="-12" x2="55" y2="-16" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="-38" y1="-12" x2="-55" y2="-16" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="24" y1="33" x2="38" y2="58" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="-24" y1="33" x2="-38" y2="58" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>

