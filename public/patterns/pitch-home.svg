    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5ebd7"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
  </defs>

  <!-- Sky band at top -->
  <rect x="0" y="0" width="1080" height="280" fill="url(#skyH)"/>
  <circle cx="900" cy="120" r="160" fill="url(#sun)"/>

  <!-- Bright mowed stripes (lighter green) -->
