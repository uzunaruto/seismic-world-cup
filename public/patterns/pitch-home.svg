  <!-- White pitch lines (crisp, day match) -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="5" fill="none">
    <rect x="40" y="40" width="1000" height="1270" rx="6"/>
    <line x1="40" y1="675" x2="1040" y2="675"/>
    <circle cx="540" cy="675" r="110"/>
    <circle cx="540" cy="675" r="6" fill="rgba(255,255,255,0.9)"/>
  </g>
  <g stroke="rgba(255,255,255,0.85)" stroke-width="4" fill="none">
    <rect x="240" y="40" width="600" height="180"/>
    <rect x="380" y="40" width="320" height="80"/>
    <circle cx="540" cy="290" r="5" fill="rgba(255,255,255,0.9)"/>
    <rect x="240" y="1130" width="600" height="180"/>
    <rect x="380" y="1230" width="320" height="80"/>
    <circle cx="540" cy="1060" r="5" fill="rgba(255,255,255,0.9)"/>
  </g>
  <g stroke="rgba(255,255,255,0.85)" stroke-width="4" fill="none">
    <path d="M 380 220 A 80 80 0 0 1 700 220"/>
    <path d="M 380 1130 A 80 80 0 0 0 700 1130"/>
  </g>
  <g stroke="rgba(255,255,255,0.85)" stroke-width="4" fill="none">
    <circle cx="990" cy="100" r="20"/>
    <circle cx="90" cy="1250" r="20"/>
  </g>

  <!-- Corner flags (top-right) -->
  <g transform="translate(960 80)" opacity="0.85">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#f5ebd7" stroke-width="3"/>
    <path d="M 0 0 L 50 8 L 45 25 L 0 18 Z" fill="url(#flag)" stroke="#d4a020" stroke-width="1.5"/>
  </g>
  <!-- Corner flag (bottom-left) -->
  <g transform="translate(120 1230)" opacity="0.85">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#f5ebd7" stroke-width="3"/>
    <path d="M 0 0 L 50 8 L 45 25 L 0 18 Z" fill="url(#flag)" stroke="#d4a020" stroke-width="1.5"/>
  </g>

  <!-- Center focus vignette (mild) -->
  <rect width="1080" height="1350" fill="url(#centerH)"/>

  <!-- Player shadow (center) -->
  <ellipse cx="540" cy="1150" rx="80" ry="14" fill="url(#ballShadow)"/>

  <!-- Ball top-right (bright, with shadow) -->
  <g transform="translate(900 280)" opacity="0.55">
    <ellipse cx="0" cy="120" rx="60" ry="8" fill="url(#ballShadow)"/>
    <circle r="80" fill="url(#ballH)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <polygon points="0,-40 38,-12 24,33 -24,33 -38,-12" fill="rgba(0,0,0,0.55)" stroke="rgba(0,0,0,0.7)" stroke-width="1.5"/>
    <line x1="38" y1="-12" x2="55" y2="-16" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
    <line x1="-38" y1="-12" x2="-55" y2="-16" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
    <line x1="24" y1="33" x2="38" y2="58" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
    <line x1="-24" y1="33" x2="-38" y2="58" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
  </g>

  <!-- Ball bottom-left (smaller, dimmer) -->
  <g transform="translate(180 1180)" opacity="0.4">
    <ellipse cx="0" cy="60" rx="40" ry="6" fill="url(#ballShadow)"/>
    <circle r="55" fill="url(#ballH)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <polygon points="0,-27 26,-9 16,23 -16,23 -26,-9" fill="rgba(0,0,0,0.55)"/>
