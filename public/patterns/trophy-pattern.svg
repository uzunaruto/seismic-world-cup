<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="trophy" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff5e0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff5e0" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <!-- World Cup trophy silhouette (stylized) - top right area -->
  <g transform="translate(900 350)" opacity="0.55">
    <!-- Globe top -->
    <circle cx="0" cy="-130" r="60" fill="url(#trophy)" stroke="rgba(255,245,224,0.4)" stroke-width="2"/>
    <path d="M -60 -130 Q 0 -150 60 -130" fill="none" stroke="rgba(255,245,224,0.35)" stroke-width="1.5"/>
    <path d="M -60 -130 Q 0 -110 60 -130" fill="none" stroke="rgba(255,245,224,0.35)" stroke-width="1.5"/>
    <ellipse cx="0" cy="-130" rx="60" ry="20" fill="none" stroke="rgba(255,245,224,0.3)" stroke-width="1"/>
    <!-- Trophy stem -->
    <path d="M -10 -70 L 10 -70 L 14 -20 L -14 -20 Z" fill="url(#trophy)" stroke="rgba(255,245,224,0.4)" stroke-width="1.5"/>
    <!-- Cup body (curved) -->
    <path d="M -45 -20 Q -55 0 -40 30 L 40 30 Q 55 0 45 -20 Z" fill="url(#trophy)" stroke="rgba(255,245,224,0.4)" stroke-width="1.5"/>
    <!-- Handles -->
    <path d="M -45 -15 Q -70 -5 -65 20" fill="none" stroke="rgba(255,245,224,0.5)" stroke-width="3"/>
    <path d="M 45 -15 Q 70 -5 65 20" fill="none" stroke="rgba(255,245,224,0.5)" stroke-width="3"/>
    <!-- Base ring -->
    <rect x="-50" y="30" width="100" height="10" fill="url(#trophy)" stroke="rgba(255,245,224,0.4)" stroke-width="1.5"/>
    <rect x="-60" y="40" width="120" height="14" fill="url(#trophy)" stroke="rgba(255,245,224,0.4)" stroke-width="1.5"/>
  </g>

  <!-- Ball bottom left -->
  <g transform="translate(250 1100)" opacity="0.45">
    <circle cx="0" cy="0" r="130" fill="url(#trophy)"/>
    <polygon points="0,-64 62,-20 38,52 -38,52 -62,-20" fill="rgba(26,20,13,0.25)" stroke="rgba(26,20,13,0.35)" stroke-width="2"/>
    <line x1="62" y1="-20" x2="90" y2="-25" stroke="rgba(26,20,13,0.15)" stroke-width="2"/>
    <line x1="-62" y1="-20" x2="-90" y2="-25" stroke="rgba(26,20,13,0.15)" stroke-width="2"/>
    <line x1="38" y1="52" x2="60" y2="100" stroke="rgba(26,20,13,0.15)" stroke-width="2"/>
    <line x1="-38" y1="52" x2="-60" y2="100" stroke="rgba(26,20,13,0.15)" stroke-width="2"/>
  </g>

  <!-- Star sparkle (fifa-style) center-bottom -->
  <g transform="translate(600 1250)" opacity="0.6">
    <polygon points="0,-40 12,-12 42,-12 18,6 28,36 0,18 -28,36 -18,6 -42,-12 -12,-12" fill="rgba(255,245,224,0.4)" stroke="rgba(255,245,224,0.7)" stroke-width="1.5"/>
  </g>

  <!-- Small ball top left -->
  <g transform="translate(180 220)" opacity="0.4">
    <circle cx="0" cy="0" r="50" fill="url(#trophy)"/>
    <polygon points="0,-25 24,-7 15,20 -15,20 -24,-7" fill="rgba(26,20,13,0.2)" stroke="rgba(26,20,13,0.3)" stroke-width="1"/>
  </g>
</svg>
