<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="focusF" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballF" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff5e0" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fff5e0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff5e0" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="goalNet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(212,160,32,0)"/>
      <stop offset="50%" stop-color="rgba(212,160,32,0.18)"/>
      <stop offset="100%" stop-color="rgba(212,160,32,0)"/>
    </linearGradient>
    <pattern id="netMesh" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(212,160,32,0.25)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Premium mowed stripes (gold-tinted) -->
  <g>
    <rect x="0" y="0" width="1080" height="135" fill="#3a8528"/>
    <rect x="0" y="135" width="1080" height="135" fill="#2e6b20"/>
    <rect x="0" y="270" width="1080" height="135" fill="#3a8528"/>
    <rect x="0" y="405" width="1080" height="135" fill="#2e6b20"/>
    <rect x="0" y="540" width="1080" height="135" fill="#3a8528"/>
    <rect x="0" y="675" width="1080" height="135" fill="#2e6b20"/>
    <rect x="0" y="810" width="1080" height="135" fill="#3a8528"/>
    <rect x="0" y="945" width="1080" height="135" fill="#2e6b20"/>
    <rect x="0" y="1080" width="1080" height="135" fill="#3a8528"/>
    <rect x="0" y="1215" width="1080" height="135" fill="#2e6b20"/>
  </g>

  <!-- Gold-tinted pitch lines (premium feel) -->
  <g stroke="rgba(212,160,32,0.7)" stroke-width="5" fill="none">
    <rect x="40" y="40" width="1000" height="1270" rx="6"/>
    <line x1="40" y1="675" x2="1040" y2="675"/>
    <circle cx="540" cy="675" r="110"/>
    <circle cx="540" cy="675" r="6" fill="rgba(212,160,32,0.7)"/>
  </g>
  <g stroke="rgba(212,160,32,0.7)" stroke-width="4" fill="none">
    <rect x="240" y="40" width="600" height="180"/>
    <rect x="380" y="40" width="320" height="80"/>
    <rect x="240" y="1130" width="600" height="180"/>
    <rect x="380" y="1230" width="320" height="80"/>
  </g>

  <!-- Goal net pattern overlay (subtle, behind everything) -->
  <g opacity="0.5">
    <rect x="0" y="0" width="1080" height="1350" fill="url(#netMesh)"/>
  </g>

  <!-- Top goal frame (silhouette behind ball) -->
  <g transform="translate(540 80)" opacity="0.55">
    <rect x="-200" y="-30" width="400" height="60" fill="none" stroke="rgba(245,235,215,0.5)" stroke-width="3"/>
    <rect x="-220" y="-30" width="20" height="100" fill="none" stroke="rgba(245,235,215,0.4)" stroke-width="3"/>
    <rect x="200" y="-30" width="20" height="100" fill="none" stroke="rgba(245,235,215,0.4)" stroke-width="3"/>
    <rect x="-220" y="70" width="440" height="6" fill="rgba(245,235,215,0.35)"/>
  </g>

  <!-- Star sparkle (FIFA-style) -->
  <g transform="translate(900 1050)" opacity="0.65">
    <polygon points="0,-30 9,-9 32,-9 14,5 21,28 0,14 -21,28 -14,5 -32,-9 -9,-9" fill="rgba(255,245,224,0.7)" stroke="rgba(255,245,224,0.9)" stroke-width="1.5"/>
  </g>
  <g transform="translate(160 360)" opacity="0.5">
    <polygon points="0,-22 7,-7 23,-7 10,3 15,20 0,10 -15,20 -10,3 -23,-7 -7,-7" fill="rgba(255,245,224,0.5)"/>
  </g>

  <!-- Center focus vignette -->
  <rect width="1080" height="1350" fill="url(#focusF)"/>

  <!-- Ball top-right (cream + gold) -->
  <g transform="translate(880 220)" opacity="0.5">
    <circle r="95" fill="url(#ballF)"/>
    <polygon points="0,-48 46,-15 28,40 -28,40 -46,-15" fill="rgba(0,0,0,0.4)" stroke="rgba(212,160,32,0.7)" stroke-width="2.5"/>
    <line x1="46" y1="-15" x2="66" y2="-19" stroke="rgba(212,160,32,0.5)" stroke-width="1.5"/>
    <line x1="-46" y1="-15" x2="-66" y2="-19" stroke="rgba(212,160,32,0.5)" stroke-width="1.5"/>
    <line x1="28" y1="40" x2="44" y2="70" stroke="rgba(212,160,32,0.5)" stroke-width="1.5"/>
    <line x1="-28" y1="40" x2="-44" y2="70" stroke="rgba(212,160,32,0.5)" stroke-width="1.5"/>
  </g>

  <!-- Ball bottom-left (smaller) -->
  <g transform="translate(180 1100)" opacity="0.4">
    <circle r="65" fill="url(#ballF)"/>
    <polygon points="0,-32 30,-10 19,27 -19,27 -30,-10" fill="rgba(0,0,0,0.4)" stroke="rgba(212,160,32,0.6)" stroke-width="2"/>
  </g>

  <!-- Trophy silhouette bottom-right -->
  <g transform="translate(900 1180)" opacity="0.4">
    <circle cx="0" cy="-90" r="38" fill="rgba(255,245,224,0.45)" stroke="rgba(255,245,224,0.6)" stroke-width="1.5"/>
    <path d="M -7 -52 L 7 -52 L 9 -15 L -9 -15 Z" fill="rgba(255,245,224,0.45)" stroke="rgba(255,245,224,0.6)" stroke-width="1.5"/>
    <path d="M -30 -15 Q -38 0 -28 20 L 28 20 Q 38 0 30 -15 Z" fill="rgba(255,245,224,0.45)" stroke="rgba(255,245,224,0.6)" stroke-width="1.5"/>
    <path d="M -30 -10 Q -48 -2 -44 14" fill="none" stroke="rgba(255,245,224,0.7)" stroke-width="2.5"/>
    <path d="M 30 -10 Q 48 -2 44 14" fill="none" stroke="rgba(255,245,224,0.7)" stroke-width="2.5"/>
    <rect x="-34" y="20" width="68" height="6" fill="rgba(255,245,224,0.5)" stroke="rgba(255,245,224,0.6)" stroke-width="1.5"/>
    <rect x="-40" y="26" width="80" height="9" fill="rgba(255,245,224,0.5)" stroke="rgba(255,245,224,0.6)" stroke-width="1.5"/>
  </g>
</svg>
