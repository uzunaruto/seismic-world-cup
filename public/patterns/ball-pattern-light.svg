<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ball" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5ebd7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f5ebd7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5ebd7" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="ballShadow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#1a140d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a140d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Big ball upper-right -->
  <g transform="translate(900 280)">
    <ellipse cx="0" cy="120" rx="200" ry="20" fill="url(#ballShadow)"/>
    <circle cx="0" cy="0" r="180" fill="url(#ball)"/>
    <!-- pentagon center -->
    <polygon points="0,-90 86,-28 53,73 -53,73 -86,-28" fill="rgba(26,20,13,0.32)" stroke="rgba(26,20,13,0.45)" stroke-width="2.5"/>
    <!-- surrounding hex hints -->
    <line x1="86" y1="-28" x2="120" y2="-30" stroke="rgba(26,20,13,0.18)" stroke-width="2"/>
    <line x1="53" y1="73" x2="85" y2="135" stroke="rgba(26,20,13,0.18)" stroke-width="2"/>
    <line x1="-86" y1="-28" x2="-120" y2="-30" stroke="rgba(26,20,13,0.18)" stroke-width="2"/>
    <line x1="-53" y1="73" x2="-85" y2="135" stroke="rgba(26,20,13,0.18)" stroke-width="2"/>
    <line x1="0" y1="-90" x2="0" y2="-145" stroke="rgba(26,20,13,0.18)" stroke-width="2"/>
  </g>

  <!-- Medium ball lower-left -->
  <g transform="translate(220 1180)">
    <ellipse cx="0" cy="95" rx="130" ry="14" fill="url(#ballShadow)"/>
    <circle cx="0" cy="0" r="125" fill="url(#ball)" opacity="0.85"/>
    <polygon points="0,-62 60,-19 37,50 -37,50 -60,-19" fill="rgba(26,20,13,0.28)" stroke="rgba(26,20,13,0.4)" stroke-width="2"/>
  </g>

  <!-- Small ball mid-left -->
  <g transform="translate(160 720)">
    <ellipse cx="0" cy="55" rx="70" ry="8" fill="url(#ballShadow)"/>
    <circle cx="0" cy="0" r="65" fill="url(#ball)" opacity="0.7"/>
    <polygon points="0,-32 31,-10 19,26 -19,26 -31,-10" fill="rgba(26,20,13,0.25)" stroke="rgba(26,20,13,0.35)" stroke-width="1.5"/>
  </g>
</svg>
